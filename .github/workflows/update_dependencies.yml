name: Update manifest.json requirements

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Enable manual run

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check and update imagespec version
        run: |
          python - <<'PY'
          import json
          import urllib.request
          import re
          import os
          import sys
          
          manifest_path = "custom_components/niimbot/manifest.json"
          with open(manifest_path, "r", encoding="utf-8") as f:
              manifest = json.load(f)
          
          # Find current imagespec version
          current_req = None
          current_version = None
          for req in manifest.get("requirements", []):
              if req.startswith("imagespec"):
                  current_req = req
                  match = re.search(r"==([0-9.]+)", req)
                  if match:
                      current_version = match.group(1)
                  break
          
          if not current_version:
              print("No imagespec requirement found in manifest.json")
              sys.exit(0)
              
          # Fetch latest version from PyPI
          try:
              with urllib.request.urlopen("https://pypi.org/pypi/imagespec/json") as response:
                  data = json.loads(response.read().decode())
                  latest_version = data["info"]["version"]
          except Exception as e:
              print(f"Failed to fetch from PyPI: {e}")
              sys.exit(1)
              
          print(f"Current version: {current_version}, Latest version: {latest_version}")
          
          if current_version != latest_version:
              # Read raw text to preserve formatting and update the version
              with open(manifest_path, "r", encoding="utf-8") as f:
                  text = f.read()
              new_text = text.replace(f"=={current_version}", f"=={latest_version}")
              with open(manifest_path, "w", encoding="utf-8", newline="\n") as f:
                  f.write(new_text)
              
              # Set output environment variable for next steps
              if 'GITHUB_ENV' in os.environ:
                  with open(os.environ['GITHUB_ENV'], 'a') as env_file:
                      env_file.write("VERSION_UPDATED=true\n")
                      env_file.write(f"LATEST_VERSION={latest_version}\n")
          else:
              print("Already up to date!")
          PY

      - name: Create Pull Request
        if: env.VERSION_UPDATED == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_VERSION: ${{ env.LATEST_VERSION }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}"

          git checkout -B dep-bump-imagespec
          git add custom_components/niimbot/manifest.json
          git commit -m "chore: bump imagespec to ${LATEST_VERSION}"
          git push --force-with-lease origin dep-bump-imagespec

          existing_pr="$(gh pr list --head dep-bump-imagespec --base master --json number --jq '.[0].number' || true)"
          if [ -n "$existing_pr" ] && [ "$existing_pr" != "null" ]; then
            gh pr edit "$existing_pr" \
              --title "chore: bump imagespec to ${LATEST_VERSION}" \
              --body "Automated dependency update: bumps imagespec to version ${LATEST_VERSION}."
          elif ! gh pr create \
            --base master \
            --head dep-bump-imagespec \
            --title "chore: bump imagespec to ${LATEST_VERSION}" \
            --body "Automated dependency update: bumps imagespec to version ${LATEST_VERSION}."; then
            echo "::error::Failed to create pull request. In repository Settings > Actions > General, enable 'Allow GitHub Actions to create and approve pull requests'."
            echo "Branch was pushed. Open a PR manually: https://github.com/${GITHUB_REPOSITORY}/compare/master...dep-bump-imagespec?expand=1"
            exit 1
          fi
